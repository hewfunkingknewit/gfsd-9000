<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="g" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00fff0"/>
      <stop offset="100%" stop-color="#003a3a"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="64" height="64" rx="10" fill="#050510"/>

  <!-- radar dish -->
  <path d="M16 44 Q32 18 48 44" 
        fill="none" 
        stroke="#00fff0" 
        stroke-width="3"/>

  <!-- radar base -->
  <rect x="28" y="44" width="8" height="6" fill="#00fff0"/>

  <!-- signal waves -->
  <circle cx="32" cy="20" r="5" fill="url(#g)" opacity="0.9"/>
  <circle cx="32" cy="20" r="10" fill="none" stroke="#00fff0" stroke-opacity="0.5"/>
  <circle cx="32" cy="20" r="16" fill="none" stroke="#00fff0" stroke-opacity="0.25"/>
</svg>
